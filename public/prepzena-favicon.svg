<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#0d1117"/>

  <!-- P letter mark with teal accent -->
  <!-- Vertical bar -->
  <rect x="14" y="14" width="8" height="36" rx="3" fill="#14b8a6"/>

  <!-- Top horizontal bar of P -->
  <rect x="14" y="14" width="22" height="8" rx="3" fill="#14b8a6"/>

  <!-- Middle bar of P -->
  <rect x="14" y="29" width="22" height="7" rx="3" fill="#14b8a6"/>

  <!-- Curved right side of P (simulated with rect + circle) -->
  <rect x="28" y="14" width="8" height="22" rx="3" fill="#14b8a6"/>

  <!-- Dot accent — bottom right -->
  <circle cx="46" cy="46" r="6" fill="#14b8a6" opacity="0.9"/>

  <!-- Small dot for brand identity -->
  <circle cx="46" cy="46" r="3" fill="#0d9488"/>
</svg>
